[Application]
app.classpath=$APPDIR\mail-manager.jar
app.mainclass=org.springframework.boot.loader.launch.JarLauncher

[JavaOptions]
java-options=-Djpackage.app-version=1.0.0
java-options=-Dspring.profiles.active=desktop
java-options=-Dfile.encoding=UTF-8
java-options=-Dsun.stdout.encoding=UTF-8
java-options=-Dsun.stderr.encoding=UTF-8
